[env:cyd-esp32-2432s028]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
  bodmer/TFT_eSPI@^2.5.43
  bblanchon/ArduinoJson@^7.4.2
  tzapu/WiFiManager@^2.0.17
  paulstoffregen/XPT2046_Touchscreen

build_flags =
  -D USER_SETUP_LOADED
  -D ILI9341_DRIVER

  -D TFT_WIDTH=240
  -D TFT_HEIGHT=320

  -D TFT_MISO=12
  -D TFT_MOSI=13
  -D TFT_SCLK=14
  -D TFT_CS=15
  -D TFT_DC=2
  -D TFT_RST=-1
  -D TFT_BL=21
  -D TFT_BACKLIGHT_ON=HIGH

  -D TOUCH_CS=33
  -D TOUCH_IRQ=36

  -D LOAD_GLCD
  -D LOAD_FONT2
  -D LOAD_FONT4
  -D LOAD_FONT6

  -D SPI_FREQUENCY=27000000
  -D SPI_READ_FREQUENCY=16000000
  -D TOUCH_SPI_FREQUENCY=2500000